<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>勇者の風格</title>
<style>
body {
  margin: 0;
  background: black;
  color: white;
  text-align: center;
  font-family: Arial;
}

canvas {
  display: block;
  margin: auto;
  border: 2px solid white;
  background: #111;
}

#battle {
  display: none;
  padding: 20px;
}

.hpbar {
  width: 200px;
  height: 20px;
  background: gray;
  margin: 5px auto;
}

.hp {
  height: 100%;
  background: lime;
}

button {
  padding: 10px 20px;
  margin-top: 10px;
}
</style>
</head>

<body>

<h1>⚔️ 勇者の風格 ⚔️</h1>

<canvas id="field" width="400" height="400"></canvas>

<div id="battle">
  <h2>⚡ バトル！</h2>

  <div>
    👹 敵：<span id="enemyName"></span>
    <div class="hpbar"><div id="enemyHP" class="hp"></div></div>
  </div>

  <br>

  <div>
    🐾 味方：<span id="playerName"></span>
    <div class="hpbar"><div id="playerHP" class="hp"></div></div>
  </div>

  <button onclick="attack()">こうげき</button>
</div>

<script>
const canvas = document.getElementById("field");
const ctx = canvas.getContext("2d");

let mode = "field";

let player = {x:200, y:200};

let myMonster = {
  name:"蒼炎ノ騎士ドラグレイヴ",
  hp:120,
  maxHp:120,
  atk:25
};

const enemies = [
  {name:"終焉ノ黒龍ヴァルザード", x:50, y:50, hp:100, maxHp:100, atk:20},
  {name:"虚無ノ影王ゼルヴァ", x:300, y:100, hp:90, maxHp:90, atk:22}
];

let enemy = null;

// フィールド描画
function drawField(){
  ctx.clearRect(0,0,400,400);

  // プレイヤー
  ctx.fillStyle = "cyan";
  ctx.fillRect(player.x-5, player.y-5, 10, 10);

  // 敵
  ctx.fillStyle = "red";
  enemies.forEach(e=>{
    if(e.hp > 0){
      ctx.fillRect(e.x-5, e.y-5, 10, 10);
    }
  });
}

// 衝突
function checkCollision(){
  enemies.forEach(e=>{
    let dx = player.x - e.x;
    let dy = player.y - e.y;
    if(Math.sqrt(dx*dx+dy*dy)<10 && e.hp>0){
      startBattle(e);
    }
  });
}

// 戦闘開始
function startBattle(e){
  mode = "battle";
  enemy = e;

  document.getElementById("battle").style.display = "block";
  canvas.style.display = "none";

  document.getElementById("enemyName").innerText = e.name;
  document.getElementById("playerName").innerText = myMonster.name;

  updateHP();
}

// HP更新
function updateHP(){
  document.getElementById("enemyHP").style.width =
    (enemy.hp/enemy.maxHp*100)+"%";

  document.getElementById("playerHP").style.width =
    (myMonster.hp/myMonster.maxHp*100)+"%";
}

// 攻撃
function attack(){
  enemy.hp -= myMonster.atk;

  if(enemy.hp <= 0){
    alert("勝利！");
    endBattle();
    return;
  }

  myMonster.hp -= enemy.atk;

  if(myMonster.hp <= 0){
    alert("敗北...");
    location.reload();
  }

  updateHP();
}

// 戦闘終了
function endBattle(){
  document.getElementById("battle").style.display = "none";
  canvas.style.display = "block";
  mode = "field";
}

// 移動（矢印キー）
document.addEventListener("keydown", e=>{
  if(mode !== "field") return;

  if(e.key==="ArrowUp") player.y-=10;
  if(e.key==="ArrowDown") player.y+=10;
  if(e.key==="ArrowLeft") player.x-=10;
  if(e.key==="ArrowRight") player.x+=10;

  drawField();
  checkCollision();
});

drawField();
</script>

</body>
</html>
