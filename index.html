<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>モグラ叩き</title>
<style>
body {
  text-align: center;
  font-family: sans-serif;
  background: #87ceeb;
}

h1 { margin: 10px; }

#score, #time, #best {
  margin: 5px;
  font-size: 18px;
}

.grid {
  width: 300px;
  margin: auto;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}

.hole {
  width: 90px;
  height: 90px;
  background: #654321;
  border-radius: 50%;
  position: relative;
  cursor: pointer;
}

/* 🔴 赤モグラ */
.mole {
  width: 70px;
  height: 70px;
  background: red;
  border-radius: 50%;
  position: absolute;
  bottom: 0;
  left: 10px;
  box-shadow: 0 0 10px darkred;
}

/* 👀 目 */
.mole::before, .mole::after {
  content: "";
  position: absolute;
  width: 10px;
  height: 10px;
  background: white;
  border-radius: 50%;
  top: 20px;
}
.mole::before { left: 15px; }
.mole::after { right: 15px; }

.hit {
  background: red !important;
}
</style>
</head>

<body>

<h1>🐹 モグラ叩きゲーム</h1>
<div id="score">Score: 0</div>
<div id="time">Time: 30</div>
<div id="best">Best: 0</div>

<button onclick="startGame()">スタート</button>
<button onclick="restartGame()">再スタート</button>

<div class="grid" id="grid"></div>

<script>
const grid = document.getElementById("grid");
let holes = [];
let score = 0;
let time = 30;
let best = localStorage.getItem("moleBest") || 0;
let gameInterval;
let timerInterval;

// グリッド作成
for(let i=0;i<9;i++){
  let hole = document.createElement("div");
  hole.className = "hole";
  grid.appendChild(hole);
  holes.push(hole);
}

document.getElementById("best").innerText="Best: "+best;

// モグラ出現
function showMole(){
  holes.forEach(h=>h.innerHTML="");

  let index = Math.floor(Math.random()*9);
  let mole = document.createElement("div");
  mole.className = "mole";

  mole.onclick = ()=>{
    score++;
    holeHit(holes[index]);
    updateScore();
  };

  holes[index].appendChild(mole);
}

// ヒット演出
function holeHit(hole){
  hole.classList.add("hit");
  setTimeout(()=>hole.classList.remove("hit"),100);
}

// スコア更新
function updateScore(){
  document.getElementById("score").innerText="Score: "+score;
}

// 🎮 ゲーム開始
function startGame(){
  resetAll();

  gameInterval = setInterval(showMole, 800);

  timerInterval = setInterval(()=>{
    time--;
    document.getElementById("time").innerText="Time: "+time;

    // 難易度アップ
    if(time % 10 === 0){
      clearInterval(gameInterval);
      gameInterval = setInterval(showMole, Math.max(200, 800 - (30-time)*20));
    }

    if(time <= 0){
      endGame();
    }
  },1000);
}

// 🔁 再スタート（再集計）
function restartGame(){
  clearInterval(gameInterval);
  clearInterval(timerInterval);
  resetAll();
}

// 🔄 初期化
function resetAll(){
  score = 0;
  time = 30;
  updateScore();
  document.getElementById("time").innerText="Time: "+time;
  holes.forEach(h=>h.innerHTML="");
}

// 終了
function endGame(){
  clearInterval(gameInterval);
  clearInterval(timerInterval);

  holes.forEach(h=>h.innerHTML="");

  if(score > best){
    best = score;
    localStorage.setItem("moleBest", best);
  }

  document.getElementById("best").innerText="Best: "+best;

  setTimeout(()=>alert("終了！スコア: "+score),100);
}
</script>

</body>
</html>
