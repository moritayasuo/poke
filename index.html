<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>勇者の風格</title>
<style>
body { background:black; color:white; text-align:center; }
canvas { border:2px solid white; background:#111; }

#ui { position:fixed; bottom:0; width:100%; background:#222; padding:10px; }
button { margin:5px; padding:10px; }

.hpbar { width:150px; height:10px; background:gray; }
.hp { height:100%; background:lime; }
</style>
</head>

<body>

<h1>⚔️ 勇者の風格 ⚔️</h1>
<canvas id="game" width="400" height="400"></canvas>

<div id="battleUI" style="display:none;">
敵：<span id="enemyName"></span>
<div class="hpbar"><div id="enemyHP" class="hp"></div></div>

味方：<span id="playerName"></span>
<div class="hpbar"><div id="playerHP" class="hp"></div></div>
</div>

<div id="ui"></div>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

let mode="field";

// ===== セーブ =====
function save(){
  localStorage.setItem("save", JSON.stringify({player,party}));
}
function load(){
  let s=localStorage.getItem("save");
  if(s){
    let d=JSON.parse(s);
    player=d.player;
    party=d.party;
  }
}

// ===== モンスター =====
function createMonster(name,type){
  return {
    name,type,level:1,exp:0,
    hp:100,maxHp:100,atk:20,
    skills:[
      {name:"斬撃",type:"normal",power:20},
      {name:"炎撃",type:"fire",power:25},
      {name:"水流",type:"water",power:25},
      {name:"草刃",type:"grass",power:25}
    ]
  };
}

let party=[createMonster("蒼炎ノ騎士ドラグレイヴ","fire")];

let player={x:200,y:200};

let enemy;

// ===== マップ =====
function draw(){
  ctx.clearRect(0,0,400,400);

  ctx.fillStyle="green";
  ctx.fillRect(0,0,400,150);

  ctx.fillStyle="gray";
  ctx.fillRect(0,150,400,250);

  ctx.fillStyle="cyan";
  ctx.fillRect(player.x-5,player.y-5,10,10);
}

// ===== エンカウント =====
function encounter(){
  if(player.y<150 && Math.random()<0.1){
    startBattle();
  }
}

// ===== 戦闘 =====
function startBattle(){
  mode="battle";
  enemy=createMonster("黒龍","fire");

  document.getElementById("battleUI").style.display="block";
  showCommands();
  updateHP();
}

// ===== UI =====
function showCommands(){
  document.getElementById("ui").innerHTML=`
    <button onclick="fight()">たたかう</button>
    <button onclick="catchM()">つかまえる</button>
    <button onclick="save()">セーブ</button>
  `;
}

function fight(){
  let html="";
  party[0].skills.forEach((s,i)=>{
    html+=`<button onclick="attack(${i})">${s.name}</button>`;
  });
  document.getElementById("ui").innerHTML=html;
}

// ===== 相性 =====
function mult(a,b){
  if(a==="fire"&&b==="grass")return 2;
  if(a==="water"&&b==="fire")return 2;
  if(a==="grass"&&b==="water")return 2;
  return 1;
}

// ===== 攻撃 =====
function attack(i){
  let p=party[0];
  let s=p.skills[i];

  enemy.hp-=s.power*mult(s.type,enemy.type);

  if(enemy.hp<=0){
    gain(p);
    end();
    return;
  }

  p.hp-=enemy.atk;

  if(p.hp<=0){
    alert("負け");
    location.reload();
  }

  updateHP();
}

// ===== 捕獲 =====
function catchM(){
  if(Math.random()<0.4){
    party.push(createMonster(enemy.name,enemy.type));
    alert("捕獲成功");
    end();
  } else alert("失敗");
}

// ===== 経験値 =====
function gain(p){
  p.exp+=50;
  if(p.exp>=100){
    p.level++;
    p.exp=0;
    p.maxHp+=20;
    p.hp=p.maxHp;
    p.atk+=5;
    alert("レベルアップ");
  }
}

// ===== 更新 =====
function updateHP(){
  document.getElementById("enemyName").innerText=enemy.name;
  document.getElementById("playerName").innerText=party[0].name;

  document.getElementById("enemyHP").style.width=(enemy.hp/enemy.maxHp*100)+"%";
  document.getElementById("playerHP").style.width=(party[0].hp/party[0].maxHp*100)+"%";
}

// ===== 終了 =====
function end(){
  mode="field";
  document.getElementById("battleUI").style.display="none";
  document.getElementById("ui").innerHTML="";
  draw();
}

// ===== 操作 =====
document.addEventListener("keydown",e=>{
  if(mode!=="field") return;

  if(e.key==="ArrowUp") player.y-=10;
  if(e.key==="ArrowDown") player.y+=10;
  if(e.key==="ArrowLeft") player.x-=10;
  if(e.key==="ArrowRight") player.x+=10;

  encounter();
  draw();
});

load();
draw();
</script>
</body>
</html>
