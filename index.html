<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>禁忌ノ数式</title>
<style>
body {
  background: #111;
  color: white;
  text-align: center;
  font-family: sans-serif;
}

h1 { margin-top: 10px; }

#score, #best {
  margin: 5px;
}

.grid {
  width: 400px;
  height: 400px;
  margin: auto;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
  background: #222;
  padding: 10px;
  border-radius: 10px;
}

.tile {
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 14px;
  border-radius: 8px;
  transition: 0.2s;
}

.effect {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 30px;
  color: gold;
  animation: pop 0.6s;
}

@keyframes pop {
  0% { transform: scale(0.5) translate(-50%, -50%); }
  50% { transform: scale(1.5) translate(-50%, -50%); }
  100% { transform: scale(1) translate(-50%, -50%); }
}
</style>
</head>

<body>

<h1>禁忌ノ数式</h1>
<div id="score">Score: 0</div>
<div id="best">Best: 0</div>

<div class="grid" id="grid"></div>

<script>
let board = Array(4).fill().map(()=>Array(4).fill(0));
let score = 0;
let best = localStorage.getItem("best") || 0;

const names = {
  2:"平民",4:"商人",8:"武士",16:"大名",
  32:"将軍",64:"皇族",128:"神官",256:"英雄",
  512:"伝説",1024:"神",2048:"創造主"
};

const colors = {
  2:"#aaa",4:"#bbb",8:"#f90",16:"#f60",
  32:"#f30",64:"#f00",128:"#ff0",256:"#0ff",
  512:"#0f0",1024:"#90f",2048:"gold"
};

function addTile(){
  let empty=[];
  for(let r=0;r<4;r++){
    for(let c=0;c<4;c++){
      if(board[r][c]===0) empty.push({r,c});
    }
  }
  if(empty.length===0) return;
  let {r,c}=empty[Math.floor(Math.random()*empty.length)];
  board[r][c]=Math.random()<0.9?2:4;
}

function draw(){
  const grid=document.getElementById("grid");
  grid.innerHTML="";
  for(let r=0;r<4;r++){
    for(let c=0;c<4;c++){
      let div=document.createElement("div");
      div.className="tile";
      let val=board[r][c];

      if(val){
        div.innerText=names[val]||val;
        div.style.background=colors[val]||"#444";
      } else {
        div.style.background="#333";
      }

      grid.appendChild(div);
    }
  }
  document.getElementById("score").innerText="Score: "+score;
  document.getElementById("best").innerText="Best: "+best;
}

function effect(text){
  let e=document.createElement("div");
  e.className="effect";
  e.innerText=text;
  document.body.appendChild(e);
  setTimeout(()=>e.remove(),600);
}

function slide(row){
  let arr=row.filter(v=>v);
  for(let i=0;i<arr.length-1;i++){
    if(arr[i]===arr[i+1]){
      arr[i]*=2;
      score+=arr[i];
      effect("昇格！ "+(names[arr[i]]||""));
      if(arr[i]===2048){
        setTimeout(()=>alert("🎉 創造主降臨！"),100);
      }
      arr[i+1]=0;
    }
  }
  arr=arr.filter(v=>v);
  while(arr.length<4) arr.push(0);
  return arr;
}

function move(dir){
  let prev=JSON.stringify(board);

  if(dir==="left"){
    for(let i=0;i<4;i++) board[i]=slide(board[i]);
  }
  if(dir==="right"){
    for(let i=0;i<4;i++) board[i]=slide(board[i].reverse()).reverse();
  }
  if(dir==="up"){
    transpose(); move("left"); transpose();
  }
  if(dir==="down"){
    transpose(); move("right"); transpose();
  }

  if(prev!==JSON.stringify(board)){
    addTile();
    if(score>best){
      best=score;
      localStorage.setItem("best",best);
    }
    draw();
    checkGameOver();
  }
}

function transpose(){
  board=board[0].map((_,i)=>board.map(r=>r[i]));
}

function checkGameOver(){
  for(let r=0;r<4;r++){
    for(let c=0;c<4;c++){
      if(board[r][c]===0) return;
      if(c<3 && board[r][c]===board[r][c+1]) return;
      if(r<3 && board[r][c]===board[r+1][c]) return;
    }
  }
  setTimeout(()=>alert("ゲームオーバー"),100);
}

// キー操作
document.addEventListener("keydown",e=>{
  if(e.key==="ArrowLeft") move("left");
  if(e.key==="ArrowRight") move("right");
  if(e.key==="ArrowUp") move("up");
  if(e.key==="ArrowDown") move("down");
});

// スマホスワイプ
let startX, startY;
document.addEventListener("touchstart",e=>{
  startX=e.touches[0].clientX;
  startY=e.touches[0].clientY;
});

document.addEventListener("touchend",e=>{
  let dx=e.changedTouches[0].clientX-startX;
  let dy=e.changedTouches[0].clientY-startY;

  if(Math.abs(dx)>Math.abs(dy)){
    if(dx>0) move("right"); else move("left");
  } else {
    if(dy>0) move("down"); else move("up");
  }
});

// 初期化
addTile();
addTile();
draw();
</script>

</body>
</html>
