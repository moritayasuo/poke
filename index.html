<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>勇者の風格</title>
<style>
body {
  margin: 0;
  background: black;
  color: white;
  text-align: center;
  font-family: Arial;
}

canvas {
  background: #111;
  display: block;
  margin: auto;
  border: 2px solid white;
}

#log {
  height: 120px;
  overflow-y: auto;
  border: 1px solid white;
  margin: 10px;
  padding: 5px;
}
</style>
</head>
<body>

<h1>⚔️ 勇者の風格 ⚔️</h1>
<p>WASDで移動 / 敵に触れると戦闘</p>

<canvas id="game" width="400" height="400"></canvas>

<div id="log"></div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let player = {x:200, y:200, hp:120, atk:25};

const enemies = [
  {name:"終焉ノ黒龍ヴァルザード", x:50, y:50, hp:80, atk:20},
  {name:"虚無ヲ喰ラウ影王ゼルヴァ", x:300, y:100, hp:70, atk:22},
  {name:"禁忌ノ堕天使ルシフェリオン", x:100, y:300, hp:90, atk:18}
];

let currentEnemy = null;

function log(text){
  const div = document.getElementById("log");
  div.innerHTML += text + "<br>";
  div.scrollTop = div.scrollHeight;
}

function drawPlayer(){
  ctx.fillStyle = "cyan";
  ctx.beginPath();
  ctx.arc(player.x, player.y, 10, 0, Math.PI*2);
  ctx.fill();

  // 顔っぽいイラスト
  ctx.fillStyle = "white";
  ctx.fillRect(player.x-3, player.y-3, 2, 2);
  ctx.fillRect(player.x+1, player.y-3, 2, 2);
}

function drawEnemy(e){
  ctx.fillStyle = "red";
  ctx.beginPath();
  ctx.rect(e.x-10, e.y-10, 20, 20);
  ctx.fill();

  // 厨二っぽい目
  ctx.fillStyle = "black";
  ctx.fillRect(e.x-5, e.y-5, 3, 3);
}

function draw(){
  ctx.clearRect(0,0,400,400);

  drawPlayer();

  enemies.forEach(e => {
    if(e.hp > 0) drawEnemy(e);
  });
}

function checkCollision(){
  enemies.forEach(e=>{
    if(e.hp > 0){
      let dx = player.x - e.x;
      let dy = player.y - e.y;
      let dist = Math.sqrt(dx*dx + dy*dy);

      if(dist < 20){
        battle(e);
      }
    }
  });
}

function battle(e){
  if(currentEnemy) return;

  currentEnemy = e;
  log("🔥 " + e.name + " 出現！");
  
  let interval = setInterval(()=>{
    e.hp -= player.atk;
    log("⚔️ 攻撃！ -" + player.atk);

    if(e.hp <= 0){
      log("💥 撃破！");
      currentEnemy = null;
      clearInterval(interval);
      return;
    }

    player.hp -= e.atk;
    log("💀 被ダメ -" + e.atk);

    if(player.hp <= 0){
      log("☠️ GAME OVER");
      clearInterval(interval);
    }

  }, 1000);
}

document.addEventListener("keydown", e=>{
  if(currentEnemy) return;

  if(e.key === "w") player.y -= 10;
  if(e.key === "s") player.y += 10;
  if(e.key === "a") player.x -= 10;
  if(e.key === "d") player.x += 10;

  draw();
  checkCollision();
});

draw();
</script>

</body>
</html>
