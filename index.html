<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>2048ゲーム</title>
<style>
body {
  background: #faf8ef;
  text-align: center;
  font-family: Arial;
}

h1 { margin-top: 20px; }

#score {
  font-size: 20px;
  margin: 10px;
}

.grid {
  width: 400px;
  height: 400px;
  margin: auto;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
  background: #bbada0;
  padding: 10px;
  border-radius: 10px;
}

.tile {
  width: 90px;
  height: 90px;
  background: #cdc1b4;
  font-size: 24px;
  font-weight: bold;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 5px;
}

.tile[data-value="2"] { background: #eee4da; }
.tile[data-value="4"] { background: #ede0c8; }
.tile[data-value="8"] { background: #f2b179; color:white; }
.tile[data-value="16"] { background: #f59563; color:white; }
.tile[data-value="32"] { background: #f67c5f; color:white; }
.tile[data-value="64"] { background: #f65e3b; color:white; }
.tile[data-value="128"] { background: #edcf72; color:white; }
.tile[data-value="256"] { background: #edcc61; color:white; }
.tile[data-value="512"] { background: #edc850; color:white; }
.tile[data-value="1024"] { background: #edc53f; color:white; }
.tile[data-value="2048"] { background: gold; color:black; }
</style>
</head>

<body>

<h1>2048</h1>
<div id="score">Score: 0</div>
<div class="grid" id="grid"></div>

<script>
let board = Array(4).fill().map(()=>Array(4).fill(0));
let score = 0;

function addTile() {
  let empty = [];
  for(let r=0;r<4;r++){
    for(let c=0;c<4;c++){
      if(board[r][c]===0) empty.push({r,c});
    }
  }
  if(empty.length===0) return;
  let {r,c} = empty[Math.floor(Math.random()*empty.length)];
  board[r][c] = Math.random()<0.9 ? 2 : 4;
}

function draw() {
  const grid = document.getElementById("grid");
  grid.innerHTML="";
  for(let r=0;r<4;r++){
    for(let c=0;c<4;c++){
      let div=document.createElement("div");
      div.className="tile";
      let val=board[r][c];
      if(val!==0){
        div.innerText=val;
        div.setAttribute("data-value", val);
      }
      grid.appendChild(div);
    }
  }
  document.getElementById("score").innerText="Score: "+score;
}

function slide(row){
  let arr = row.filter(v=>v);
  for(let i=0;i<arr.length-1;i++){
    if(arr[i]===arr[i+1]){
      arr[i]*=2;
      score+=arr[i];
      arr[i+1]=0;
    }
  }
  arr = arr.filter(v=>v);
  while(arr.length<4) arr.push(0);
  return arr;
}

function moveLeft(){
  for(let i=0;i<4;i++){
    board[i]=slide(board[i]);
  }
}

function moveRight(){
  for(let i=0;i<4;i++){
    board[i]=slide(board[i].reverse()).reverse();
  }
}

function transpose(){
  board = board[0].map((_,i)=>board.map(r=>r[i]));
}

function moveUp(){
  transpose();
  moveLeft();
  transpose();
}

function moveDown(){
  transpose();
  moveRight();
  transpose();
}

function isGameOver(){
  for(let r=0;r<4;r++){
    for(let c=0;c<4;c++){
      if(board[r][c]===0) return false;
      if(c<3 && board[r][c]===board[r][c+1]) return false;
      if(r<3 && board[r][c]===board[r+1][c]) return false;
    }
  }
  return true;
}

document.addEventListener("keydown", e=>{
  let prev = JSON.stringify(board);

  if(e.key==="ArrowLeft") moveLeft();
  if(e.key==="ArrowRight") moveRight();
  if(e.key==="ArrowUp") moveUp();
  if(e.key==="ArrowDown") moveDown();

  if(prev !== JSON.stringify(board)){
    addTile();
    draw();
    if(isGameOver()){
      setTimeout(()=>alert("ゲームオーバー！"),100);
    }
  }
});

addTile();
addTile();
draw();
</script>

</body>
</html>
