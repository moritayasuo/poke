<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>勇者の風格</title>
<style>
body { margin:0; background:black; color:white; font-family:sans-serif; }
canvas { display:block; margin:auto; border:2px solid white; background:#111; }

#battleUI {
  position: absolute;
  bottom: 0;
  width: 100%;
  background: #eee;
  color: black;
  display: none;
}

#text {
  height: 80px;
  padding: 10px;
  border-top: 2px solid black;
}

#commands {
  display: grid;
  grid-template-columns: 1fr 1fr;
}

button {
  padding: 15px;
  font-size: 16px;
  border: 1px solid black;
  background: white;
}

.hpbar {
  width: 120px;
  height: 10px;
  background: gray;
}
.hp { height:100%; background:green; }
</style>
</head>

<body>

<canvas id="game" width="400" height="400"></canvas>

<div id="battleUI">
  <div style="display:flex; justify-content:space-between; padding:10px;">
    <div>
      <div id="enemyName"></div>
      <div class="hpbar"><div id="enemyHP" class="hp"></div></div>
    </div>
    <div>
      <div id="playerName"></div>
      <div class="hpbar"><div id="playerHP" class="hp"></div></div>
    </div>
  </div>

  <div id="text">野生のモンスターが現れた！</div>
  <div id="commands"></div>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let mode="field";
let player={x:200,y:200};

function createMonster(name,type){
  return {
    name,type,level:1,exp:0,
    hp:100,maxHp:100,atk:20,
    skills:[
      {name:"斬撃",power:20,type:"normal"},
      {name:"炎撃",power:25,type:"fire"},
      {name:"水流",power:25,type:"water"},
      {name:"草刃",power:25,type:"grass"}
    ]
  };
}

let party=[createMonster("蒼炎ノ騎士ドラグレイヴ","fire")];
let current=0;
let enemy;

// ===== 描画 =====
function draw(){
  ctx.clearRect(0,0,400,400);

  ctx.fillStyle="green";
  ctx.fillRect(0,0,400,150);

  ctx.fillStyle="gray";
  ctx.fillRect(0,150,400,250);

  ctx.fillStyle="cyan";
  ctx.fillRect(player.x-5,player.y-5,10,10);
}

// ===== エンカウント =====
function encounter(){
  if(player.y<150 && Math.random()<0.1){
    startBattle();
  }
}

// ===== 戦闘 =====
function startBattle(){
  mode="battle";
  enemy=createMonster("終焉ノ黒龍","fire");

  document.getElementById("battleUI").style.display="block";

  updateUI();
  showMain();
}

// ===== UI =====
function showMain(){
  document.getElementById("commands").innerHTML=`
    <button onclick="fight()">たたかう</button>
    <button onclick="change()">ポケモン</button>
    <button onclick="catchM()">つかまえる</button>
    <button onclick="run()">にげる</button>
  `;
}

function fight(){
  let html="";
  party[current].skills.forEach((s,i)=>{
    html+=`<button onclick="attack(${i})">${s.name}</button>`;
  });
  document.getElementById("commands").innerHTML=html;
}

function change(){
  let html="";
  party.forEach((p,i)=>{
    html+=`<button onclick="switchMon(${i})">${p.name}</button>`;
  });
  document.getElementById("commands").innerHTML=html;
}

// ===== 相性 =====
function mult(a,b){
  if(a==="fire"&&b==="grass")return 2;
  if(a==="water"&&b==="fire")return 2;
  if(a==="grass"&&b==="water")return 2;
  return 1;
}

// ===== 攻撃 =====
function attack(i){
  let p=party[current];
  let s=p.skills[i];

  enemy.hp-=s.power*mult(s.type,enemy.type);

  if(enemy.hp<=0){
    gain(p);
    end();
    return;
  }

  p.hp-=enemy.atk;

  if(p.hp<=0){
    document.getElementById("text").innerText="たおれた！";
  }

  updateUI();
}

// ===== 捕獲 =====
function catchM(){
  if(Math.random()<0.4){
    party.push(createMonster(enemy.name,enemy.type));
    document.getElementById("text").innerText="捕獲成功！";
    end();
  } else {
    document.getElementById("text").innerText="失敗…";
  }
}

// ===== 逃げる =====
function run(){
  end();
}

// ===== 切替 =====
function switchMon(i){
  current=i;
  showMain();
}

// ===== 経験値 =====
function gain(p){
  p.exp+=50;
  if(p.exp>=100){
    p.level++;
    p.exp=0;
    p.maxHp+=20;
    p.hp=p.maxHp;
    p.atk+=5;
  }
}

// ===== UI更新 =====
function updateUI(){
  document.getElementById("enemyName").innerText=enemy.name;
  document.getElementById("playerName").innerText=party[current].name;

  document.getElementById("enemyHP").style.width=(enemy.hp/enemy.maxHp*100)+"%";
  document.getElementById("playerHP").style.width=(party[current].hp/party[current].maxHp*100)+"%";
}

// ===== 終了 =====
function end(){
  mode="field";
  document.getElementById("battleUI").style.display="none";
  draw();
}

// ===== 操作 =====
document.addEventListener("keydown",e=>{
  if(mode!=="field") return;

  if(e.key==="ArrowUp") player.y-=10;
  if(e.key==="ArrowDown") player.y+=10;
  if(e.key==="ArrowLeft") player.x-=10;
  if(e.key==="ArrowRight") player.x+=10;

  encounter();
  draw();
});

draw();
</script>
</body>
</html>
