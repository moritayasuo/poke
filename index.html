<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>勇者の風格</title>
<style>
body { background:black; color:white; text-align:center; font-family:sans-serif; }
canvas { border:2px solid white; background:#111; }

#ui {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: #222;
  padding: 10px;
}

button { margin:5px; padding:10px; }

.hpbar { width:150px; height:10px; background:gray; }
.hp { height:100%; background:lime; }
</style>
</head>

<body>

<h1>⚔️ 勇者の風格 ⚔️</h1>

<canvas id="game" width="400" height="400"></canvas>

<div id="battleUI" style="display:none;">
  <div>敵：<span id="enemyName"></span></div>
  <div class="hpbar"><div id="enemyHP" class="hp"></div></div>

  <div>味方：<span id="playerName"></span></div>
  <div class="hpbar"><div id="playerHP" class="hp"></div></div>
</div>

<div id="ui"></div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let mode="field";

// ===== セーブ =====
function save(){
  localStorage.setItem("save", JSON.stringify({player, party}));
}
function load(){
  let data = JSON.parse(localStorage.getItem("save"));
  if(data){
    player=data.player;
    party=data.party;
  }
}

// ===== BGM =====
let audio = new Audio();
audio.src = "https://actions.google.com/sounds/v1/ambiences/battlefield.ogg";
audio.loop = true;
audio.volume = 0.3;
audio.play();

// ===== プレイヤー =====
let player={x:200,y:200};

function createMonster(name,type){
  return {name,type,hp:100,maxHp:100,atk:20};
}

let party=[createMonster("蒼炎ノ騎士ドラグレイヴ","fire")];

let enemy;

// ===== マップ =====
function drawField(){
  ctx.clearRect(0,0,400,400);

  // 草むら
  ctx.fillStyle="green";
  ctx.fillRect(0,0,400,150);

  // 町
  ctx.fillStyle="gray";
  ctx.fillRect(0,150,400,250);

  // プレイヤー
  ctx.fillStyle="cyan";
  ctx.beginPath();
  ctx.arc(player.x,player.y,8,0,Math.PI*2);
  ctx.fill();
}

// ===== ランダム敵 =====
function randomEnemy(){
  let names=["黒龍","影王","堕天使"];
  return createMonster(names[Math.floor(Math.random()*3)],["fire","water","grass"][Math.floor(Math.random()*3)]);
}

// ===== 戦闘 =====
function startBattle(){
  mode="battle";
  enemy=randomEnemy();

  document.getElementById("battleUI").style.display="block";
  showCommands();
  updateHP();
}

// ===== UI =====
function showCommands(){
  document.getElementById("ui").innerHTML=`
    <button onclick="fight()">たたかう</button>
    <button onclick="catchMonster()">つかまえる</button>
    <button onclick="save()">セーブ</button>
  `;
}

function fight(){
  let skills=["斬撃","炎撃","水流","草刃"];
  let html="";
  skills.forEach((s,i)=>{
    html+=`<button onclick="attack(${i})">${s}</button>`;
  });
  document.getElementById("ui").innerHTML=html;
}

// ===== エフェクト =====
function effect(){
  ctx.fillStyle="white";
  ctx.fillRect(Math.random()*400,Math.random()*400,5,5);
}

// ===== 攻撃 =====
function attack(i){
  effect();

  enemy.hp-=20;
  if(enemy.hp<=0){
    alert("勝利！");
    endBattle();
    return;
  }

  party[0].hp-=10;
  if(party[0].hp<=0){
    alert("負け...");
    location.reload();
  }

  updateHP();
}

// ===== 捕獲 =====
function catchMonster(){
  if(Math.random()<0.4){
    party.push(createMonster(enemy.name,enemy.type));
    alert("捕獲成功！");
    endBattle();
  } else alert("失敗");
}

// ===== HP =====
function updateHP(){
  document.getElementById("enemyName").innerText=enemy.name;
  document.getElementById("playerName").innerText=party[0].name;

  document.getElementById("enemyHP").style.width=(enemy.hp/enemy.maxHp*100)+"%";
  document.getElementById("playerHP").style.width=(party[0].hp/party[0].maxHp*100)+"%";
}

// ===== 終了 =====
function endBattle(){
  mode="field";
  document.getElementById("battleUI").style.display="none";
  document.getElementById("ui").innerHTML="";
  drawField();
}

// ===== 操作 =====
document.addEventListener("keydown",e=>{
  if(mode!=="field") return;

  if(e.key==="ArrowUp") player.y-=10;
  if(e.key==="ArrowDown") player.y+=10;
  if(e.key==="ArrowLeft") player.x-=10;
  if(e.key==="ArrowRight") player.x+=10;

  // 草むらで戦闘
  if(player.y<150 && Math.random()<0.1){
    startBattle();
  }

  drawField();
});

load();
drawField();
</script>

</body>
</html>
